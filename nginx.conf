# Default server configuration for SPA with API proxy
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Google's public DNS resolver for dynamic upstreams
    resolver 8.8.8.8 valid=30s ipv6=off;

    # Proxy API requests to backend FastAPI service
    location /api/ {
        set $backend "https://data-archeologist-api-7x5f34toda-uc.a.run.app";
        proxy_pass $backend$request_uri;
        proxy_set_header Host "data-archeologist-api-7x5f34toda-uc.a.run.app";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_ssl_name "data-archeologist-api-7x5f34toda-uc.a.run.app";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        # CORS handling
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=UTF-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    # Serve SPA route fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
